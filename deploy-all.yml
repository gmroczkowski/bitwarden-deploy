---
- name: KROK 1 - Stworzenie maszyny VM na Proxmox
  hosts: localhost
  gather_facts: false

  vars_files:
    - group_vars/all/vars.yml
    - group_vars/all/vault.yml

  tasks:
    - name: Klonowanie maszyny z szablonu
      community.general.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "{{ pve_api_user }}"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ vault_pve_api_token_secret }}"
        validate_certs: false
        node: "{{ node }}"
        vmid: "9000"
        newid: "{{ vmid }}"
        name: "{{ vm_name }}"
        clone: "{{ template_name }}"
        full: true
        timeout: 300
        state: present

    - name: Konfiguracja parametrów Cloud-Init na nowej maszynie
      community.general.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "{{ pve_api_user }}"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ vault_pve_api_token_secret }}"
        validate_certs: false
        node: "{{ node }}"
        vmid: "{{ vmid }}"  # Targetujemy już nowo utworzone ID (120)
        update: true
        ciuser: "root"
        sshkeys: "{{ my_ssh_public_key }}"
        ipconfig:
          ipconfig0: "ip={{ target_vm_ip }}/{{ target_vm_netmask }},gw={{ target_vm_gateway }}"

    - name: Uruchomienie nowej maszyny VM
      community.general.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "{{ pve_api_user }}"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ vault_pve_api_token_secret }}"
        validate_certs: false
        node: "{{ node }}"
        vmid: "{{ vmid }}"
        state: started

    - name: Oczekiwanie na podniesienie sieci SSH na nowej maszynie
      ansible.builtin.wait_for:
        host: "{{ target_vm_ip }}"
        port: 22
        state: started
        delay: 10
        timeout: 180
      delegate_to: localhost

- name: KROK 2 - Konfiguracja Vaultwarden & Reverse Proxy
  hosts: bitwarden_server
  become: true

  tasks:
    - name: Instalacja Dockera i zależności systemowych
      ansible.builtin.apt:
        # === DODANO docker.io DO LISTY ===
        name: [apt-transport-https, ca-certificates, curl, gnupg, docker.io, python3-docker, nginx, certbot, python3-certbot-nginx]
        state: present
        update_cache: true

    # === NOWE ZADANIE: Upewniamy się, że Docker działa ===
    - name: Upewnienie się, że usługa Docker jest uruchomiona
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Stworzenie katalogu na dane Vaultwarden
      ansible.builtin.file:
        path: /opt/vaultwarden/data
        state: directory
        mode: '0755'

    - name: Uruchomienie kontenera Vaultwarden (nasłuchuje tylko lokalnie na 127.0.0.1)
      community.docker.docker_container:
        name: vaultwarden
        image: vaultwarden/server:latest
        state: started
        restart_policy: always
        ports:
          - "127.0.0.1:8080:80"
        volumes:
          - /opt/vaultwarden/data:/data
        env:
          WEBSOCKET_ENABLED: "true"
          SIGNUPS_ALLOWED: "true"

    - name: Konfiguracja Nginx jako Reverse Proxy
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/vaultwarden
        content: |
          server {
              listen 80;
              server_name {{ domain_name }};

              location / {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

    - name: Aktywacja konfiguracji Nginx
      ansible.builtin.file:
        src: /etc/nginx/sites-available/vaultwarden
        dest: /etc/nginx/sites-enabled/vaultwarden
        state: link

    - name: Usunięcie domyślnej strony Nginx
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Automatyczne wygenerowanie certyfikatu Let's Encrypt (Wymaga otwartego portu 80 na świat!)
      ansible.builtin.command: "certbot --nginx -d {{ domain_name }} --non-interactive --agree-tos --email {{ ssl_email }}"
      args:
        creates: "/etc/letsencrypt/live/{{ domain_name }}/fullchain.pem"